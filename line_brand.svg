<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Fundo Branco -->
  <rect width="400" height="400" fill="none" />

  <!-- Assinatura/Texto de Identificação (ID&LG) -->
  <text x="20" y="35" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="bold" fill="#007BFF" letter-spacing="1">GubeStream IPTV - ID&amp;LG</text>

  <!-- Grupo Principal do Personagem (Centralizado em Azul) -->
  <g transform="translate(0, 10)">
    <!-- Círculo da Cabeça -->
    <circle cx="200" cy="190" r="120" fill="none" stroke="#007BFF" stroke-width="8" />

    <!-- Olho Esquerdo (Aberto) -->
    <circle cx="160" cy="160" r="14" fill="#007BFF" />

    <!-- Olho Direito (Piscando - Arco curvado para cima) -->
    <path d="M 225 165 Q 240 150 255 165" fill="none" stroke="#007BFF" stroke-width="8" stroke-linecap="round" />

    <!-- Nariz -->
    <path d="M 200 175 L 200 200" fill="none" stroke="#007BFF" stroke-width="7" stroke-linecap="round" />

    <!-- Boca (Sorriso Feliz) -->
    <path d="M 155 215 Q 200 260 245 215" fill="none" stroke="#007BFF" stroke-width="8" stroke-linecap="round" />
  </g>
</svg>
