<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 450" width="100%" height="100%">
  <!-- Fundo Branco Geral -->
  <rect width="400" height="450" fill="none" />

  <!-- Grupo Principal do Personagem -->
  <g transform="translate(0, 0)">
    <!-- Círculo da Cabeça - Preenchido com Azul -->
    <circle cx="200" cy="170" r="120" fill="#007BFF" />

    <!-- Elementos do Rosto - Cor Branca para dar o efeito vazado no fundo azul -->
    <!-- Olho Esquerdo (Aberto) -->
    <circle cx="160" cy="140" r="14" fill="#FFFFFF" />

    <!-- Olho Direito (Piscando - Arco curvado) -->
    <path d="M 225 145 Q 240 130 255 145" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" />

    <!-- Nariz -->
    <path d="M 200 155 L 200 180" fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" />

    <!-- Boca (Sorriso Feliz) -->
    <path d="M 155 195 Q 200 240 245 195" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" />
  </g>

  <!-- Escrito maior posicionado abaixo do círculo -->
  <text x="200" y="355" 
        font-family="'Segoe UI', Roboto, Helvetica, sans-serif" 
        font-size="24" 
        font-weight="900" 
        fill="#007BFF" 
        text-anchor="middle" 
        letter-spacing="2">GubeStream IPTV - ID&amp;LG</text>
</svg>
